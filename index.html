<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />

    <meta
      name="description"
      content="Aravind Bandipelli — AI Engineer and Software Engineer building reliable agents, evaluation systems, and production software."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d0f12'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%235eead4'/%3E%3C/svg%3E"
    />
    <title>Aravind Bandipelli | AI Engineer &amp; Software Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Reverses the public/404.html redirect encoding before the app mounts.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
